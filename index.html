<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy baird Game</title>
    
    <link rel="icon" type="img/png" href="https://w7.pngwing.com/pngs/376/525/png-transparent-blue-flappy-bird-sprite-bird-animals-desktop-wallpaper-bird.png">
    
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="background"></div>

    <img src="Bird-2.png" class="bird" id="bird-1">

    <div class="message">
        Enter To Start Game 
        <p><span style="color: red;">&uarr;</span> Arrowup to Control</p>
    </div>

    <div class="score">
        <span class="score_title"></span> 
        <span class="score_val"></span>
    </div>

    <!-- 🎵 Background Music -->
    <audio id="bgMusic" loop>
        <source src="bg-music.mp3" type="audio/mpeg">
    </audio>

</body>
</html>
